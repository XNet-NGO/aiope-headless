<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f30"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="nebula1" cx="30%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#0a2035" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="75%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#0a1525" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pixelated glow for retro-tech feel -->
    <filter id="pixelGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" fill="url(#bg)"/>
  <rect width="32" height="32" fill="url(#nebula1)"/>
  <rect width="32" height="32" fill="url(#nebula2)"/>
  
  <!-- Distant stars -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="3" cy="5" r="0.15"/><circle cx="10" cy="2" r="0.1"/>
    <circle cx="19" cy="4" r="0.12"/><circle cx="28" cy="8" r="0.1"/>
    <circle cx="2" cy="15" r="0.12"/><circle cx="15" cy="28" r="0.1"/>
    <circle cx="27" cy="26" r="0.12"/><circle cx="6" cy="26" r="0.1"/>
    <circle cx="22" cy="1" r="0.1"/><circle cx="30" cy="16" r="0.1"/>
  </g>
  
  <!-- Medium stars -->
  <g fill="#55bbcc" opacity="0.3">
    <circle cx="7" cy="9" r="0.25"/><circle cx="25" cy="7" r="0.22"/>
    <circle cx="5" cy="22" r="0.25"/><circle cx="27" cy="20" r="0.22"/>
    <circle cx="16" cy="3" r="0.2"/><circle cx="16" cy="29" r="0.2"/>
  </g>
  
  <!-- Bright stars with glow -->
  <g fill="#88ddff" filter="url(#pixelGlow)">
    <circle cx="9" cy="6" r="0.38"/><circle cx="23" cy="5" r="0.32"/>
    <circle cx="6" cy="19" r="0.35"/><circle cx="26" cy="17" r="0.38"/>
    <circle cx="12" cy="24" r="0.3"/><circle cx="20" cy="24" r="0.3"/>
  </g>
  
  <!-- Main Figure - Style F: Pixel-Tech Hybrid -->
  <g filter="url(#glow)">
    <!-- Head - blocky tech node -->
    <rect x="13.2" y="6.2" width="5.6" height="5.6" rx="1" fill="#002233" stroke="#0088aa" stroke-width="0.35"/>
    <rect x="14.5" y="7.5" width="3" height="3" rx="0.5" fill="#003344"/>
    <rect x="15.3" y="8.3" width="1.4" height="1.4" rx="0.3" fill="#00bbff"/>
    <rect x="15.7" y="8.7" width="0.6" height="0.6" rx="0.15" fill="#ffffff"/>
    
    <!-- Neck -->
    <rect x="15" y="11.8" width="2" height="2" rx="0.3" fill="#007788"/>
    
    <!-- Side connectors -->
    <rect x="12" y="8.5" width="1.2" height="1" rx="0.2" fill="#0088aa"/>
    <rect x="18.8" y="8.5" width="1.2" height="1" rx="0.2" fill="#0088aa"/>
    <circle cx="10.7" cy="9" r="0.35" fill="#00bbff"/>
    <circle cx="21.3" cy="9" r="0.35" fill="#00bbff"/>
    
    <!-- Body - blocky circuit trunk -->
    <rect x="14.2" y="13.5" width="3.6" height="9" rx="0.5" fill="#003344" stroke="#006677" stroke-width="0.25"/>
    
    <!-- Body detail lines -->
    <rect x="15" y="15" width="2" height="0.4" rx="0.2" fill="#009999"/>
    <rect x="15" y="17.5" width="2" height="0.4" rx="0.2" fill="#007788"/>
    <rect x="15" y="20" width="2" height="0.4" rx="0.2" fill="#009999"/>
    
    <!-- Body circuit nodes -->
    <g fill="#00ccff">
      <rect x="14.5" y="14.5" width="1" height="1" rx="0.25"/>
      <rect x="16.5" y="14.5" width="1" height="1" rx="0.25"/>
      <rect x="14.5" y="19" width="1" height="1" rx="0.25"/>
      <rect x="16.5" y="19" width="1" height="1" rx="0.25"/>
    </g>
    
    <!-- Arms - X pose pixel style -->
    <g stroke="#00aadd" stroke-width="0.6" fill="none" stroke-linecap="square">
      <!-- Left arm -->
      <path d="M14.2 14.5 L10 12 L6.5 10"/>
      <path d="M12 13 L10.5 15"/>
      <rect x="6" y="9.5" width="1" height="1" rx="0.25" fill="#00ddff" stroke="none"/>
      
      <!-- Right arm -->
      <path d="M17.8 14.5 L22 12 L25.5 10"/>
      <path d="M20 13 L21.5 15"/>
      <rect x="24.5" y="9.5" width="1" height="1" rx="0.25" fill="#00ddff" stroke="none"/>
    </g>
    
    <!-- Joint nodes -->
    <rect x="9.5" y="11.5" width="1" height="1" rx="0.2" fill="#007799"/>
    <rect x="21.5" y="11.5" width="1" height="1" rx="0.2" fill="#007799"/>
    <rect x="5.8" y="9.3" width="1.4" height="1.4" rx="0.35" fill="#00bbff"/>
    <rect x="24.8" y="9.3" width="1.4" height="1.4" rx="0.35" fill="#00bbff"/>
    
    <!-- Legs - X pose pixel style -->
    <g stroke="#00aadd" stroke-width="0.6" fill="none" stroke-linecap="square">
      <path d="M14.2 22.5 L10 25 L7 28"/>
      <path d="M12 24 L10.5 22.5"/>
      <rect x="6.5" y="28" width="1" height="1" rx="0.25" fill="#00ddff" stroke="none"/>
      
      <path d="M17.8 22.5 L22 25 L25 28"/>
      <path d="M20 24 L21.5 22.5"/>
      <rect x="24.5" y="28" width="1" height="1" rx="0.25" fill="#00ddff" stroke="none"/>
    </g>
    
    <!-- Knee nodes -->
    <rect x="9.5" y="24.5" width="1" height="1" rx="0.2" fill="#007799"/>
    <rect x="21.5" y="24.5" width="1" height="1" rx="0.2" fill="#007799"/>
    <rect x="6.3" y="27.8" width="1.4" height="1.4" rx="0.35" fill="#00bbff"/>
    <rect x="24.3" y="27.8" width="1.4" height="1.4" rx="0.35" fill="#00bbff"/>
  </g>
  
  <!-- Outer ring with dash pattern -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#005566" stroke-width="0.2" opacity="0.4"/>
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#008899" stroke-width="0.15" opacity="0.25" stroke-dasharray="1.5 2"/>
</svg>